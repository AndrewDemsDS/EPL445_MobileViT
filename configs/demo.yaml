# ─── Demo / inference configuration ────────────────────────────
# Inherits from default.yaml at runtime

# Checkpoint
checkpoint_path: outputs/models/best_model.pth

# Input
input_video: data/raw/sample_traffic.mp4
frame_skip: 3           # process every Nth frame (1 = every frame)

# Output
output_video: outputs/predictions/annotated_output.mp4
output_csv: outputs/predictions/frame_predictions.csv
output_counts: outputs/predictions/class_counts.json

# Detection backend: "yolo" (recommended) or "sliding"
detector: yolo
yolo_weights: yolov8n.pt        # COCO-pretrained, ~6 MB, auto-downloaded
yolo_conf: 0.25                 # YOLO box-confidence threshold

# Sliding-window detection (used when detector: sliding)
max_inference_dim: 640          # resize long side for faster processing
window_sizes: [120, 180, 256]   # multi-scale patch sizes (pixels)
stride_ratio: 0.5               # window stride = size * ratio
# MobileViT mini-batch size when classifying patches. Kept small for the
# Radeon 780M iGPU — larger values reliably hang gfx1103 (SIGABRT 134)
# when the FastAPI dashboard is also resident in shared VRAM.
classifier_batch_size: 16

# Filtering
confidence_threshold: 0.70
nms_iou_threshold: 0.3

# Cross-frame tracking (SORT). When enabled, each detection gets a persistent
# track_id and aggregate_counts also reports unique vehicles per class.
enable_tracking: true
track_max_age: 5
track_min_hits: 2
track_iou_threshold: 0.3

# Visualization
show_class_label: true
font_scale: 0.7
