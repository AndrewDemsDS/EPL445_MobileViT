# ─── Training configuration ────────────────────────────────────
# Inherits from default.yaml at runtime

# Optimizer
optimizer: adamw
learning_rate: 3.0e-4
weight_decay: 1.0e-4

# Scheduler
scheduler: cosine      # cosine | step | none
warmup_epochs: 2

# Training loop
epochs: 15
early_stopping_patience: 5

# Checkpointing
checkpoint_dir: outputs/models
save_best_only: true

# Logging
log_dir: outputs/metrics
log_every_n_steps: 20

# Fine-tuning strategy
freeze_backbone_epochs: 3   # freeze backbone for first N epochs, then unfreeze

# Loss
use_class_weights: true     # inverse-frequency CE weights (small-crop filtering creates imbalance)

# Early stopping / checkpoint selection
monitor_metric: macro_f1    # 'accuracy' or 'macro_f1' — F1 is more robust to class imbalance
