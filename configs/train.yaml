# ─── Training configuration ────────────────────────────────────
# Inherits from default.yaml at runtime

# Optimizer
optimizer: adamw
learning_rate: 3.0e-4
weight_decay: 1.0e-4

# Scheduler
scheduler: cosine      # cosine | step | none
warmup_epochs: 2

# Training loop
epochs: 15
early_stopping_patience: 5

# Checkpointing
checkpoint_dir: outputs/models
save_best_only: true

# Logging
log_dir: outputs/metrics
log_every_n_steps: 20

# Fine-tuning strategy
freeze_backbone_epochs: 3   # freeze backbone for first N epochs, then unfreeze
